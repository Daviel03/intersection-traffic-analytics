description: >
  Wider multi-car GT subset for the intersection_demo scene.
  This window extends the original interaction subset to cover more approach and exit context,
  including early background cars, the main foreground crossing vehicles, and later background
  arrivals that create a broader identity-maintenance test. Boxes were seeded from ByteTrack
  and BoT-SORT consensus where both trackers agreed and manually spot-checked on early,
  middle, and late frames.
